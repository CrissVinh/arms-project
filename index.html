<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <title>A&RMS - Login System</title>
</head>
<body>

    <div class="container" id="container">
        <div class="form-container sign-up">
            <form id="register-form">
                <h1>Tạo tài khoản</h1>
                <span>Sử dụng email của bạn để đăng ký</span>
                <input type="text" id="reg-name" placeholder="Họ và tên" required>
                <input type="email" id="reg-email" placeholder="Email" required>
                <input type="password" id="reg-password" placeholder="Mật khẩu" required>
                <button type="submit">Tạo tài khoản</button>
            </form>
        </div>

        <div class="form-container sign-in">
            <form id="login-form">
                <h1>Đăng nhập Hệ thống</h1>
                <div class="social-icons">
                    <i class="fa-solid fa-building-shield" style="font-size: 50px; color: #4b3621;"></i>
                </div>
                <h2>A&RMS</h2>
                <p>Phần mềm vận hành và quản lý tòa nhà</p>
                <input type="email" id="login-email" placeholder="Tài khoản / Email" required>
                <input type="password" id="login-password" placeholder="Mật khẩu" required>
                <button type="submit">Đăng nhập</button>
                <p class="toggle-text">Chưa có tài khoản? <span id="register" style="color: #28a745; cursor: pointer; font-weight: bold;">Đăng ký</span></p>
            </form>
        </div>

        <div class="toggle-container">
            <div class="toggle">
                <div class="toggle-panel toggle-left">
                    <h1>Chào mừng trở lại!</h1>
                    <p>Nhập thông tin cá nhân của bạn để sử dụng tất cả các tính năng của trang web</p>
                    <button class="hidden" id="login">Đăng nhập</button>
                </div>
                <div class="toggle-panel toggle-right">
                    <h1>A&RMS</h1>
                    <p>Hệ thống quản lý cư dân chuyên nghiệp</p>
                    <button class="hidden" id="register-overlay">Đăng ký</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
