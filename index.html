<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A&RMS - Login System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-page">
        <div class="login-card-horizontal">
            <div class="brand-side">
                <div class="brand-content">
                    <i class="fa-solid fa-building-shield"></i>
                    <h1>A&RMS</h1>
                    <p>Phần mềm vận hành và quản lý tòa nhà</p>
                </div>
            </div>

            <div class="form-side">
                <div id="loginSection">
                    <h2>Đăng nhập Hệ thống</h2>
                    <form id="loginForm">
                        <div class="input-box">
                            <i class="fa-solid fa-user"></i>
                            <input type="email" id="loginEmail" placeholder="Tài khoản / Email" required>
                        </div>
                        <div class="input-box">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" id="loginPassword" placeholder="Mật khẩu" required>
                        </div>
                        <button type="submit" class="btn-submit">Đăng nhập</button>
                    </form>
                    <a href="#" id="toRegister" class="link-btn">Chưa có tài khoản? Đăng ký</a>
                </div>

                <div id="registerSection" style="display: none;">
                    <h2>Đăng ký thành viên</h2>
                    <form id="registerForm">
                        <div class="input-box"><input type="text" id="regName" placeholder="Họ và tên" required></div>
                        <div class="input-box"><input type="email" id="regEmail" placeholder="Email" required></div>
                        <div class="input-box"><input type="password" id="regPassword" placeholder="Mật khẩu" required></div>
                        <button type="submit" class="btn-submit">Tạo tài khoản</button>
                    </form>
                    <a href="#" id="toLogin" class="link-btn">Quay lại đăng nhập</a>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
